services:
  postgres:
    image: postgres:16-alpine
    container_name: task-tracker-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: task_tracker_db
      POSTGRES_USER: task_tracker_user
      POSTGRES_PASSWORD: task_tracker_password

    ports:
      - "5432:5432"

    volumes:
      - task_tracker_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_tracker_user -d task_tracker_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: task-tracker-backend
    restart: unless-stopped

    environment:
      PORT: 5000
      DATABASE_URL: postgresql://task_tracker_user:task_tracker_password@postgres:5432/task_tracker_db
      JWT_SECRET: task_tracker_super_secret_key

    ports:
      - "5000:5000"

    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: task-tracker-frontend
    restart: unless-stopped

    environment:
      VITE_API_BASE_URL: http://localhost:5000/api

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  task_tracker_postgres_data:
